<style>

body { font-family: Georgia, 'Times New Roman', serif; background: #F5F0E8; color: #1a1a1a; min-height: 100vh; }
.wrap { max-width: 520px; margin: 0 auto; padding: 0 24px; min-height: 100vh; display: flex; flex-direction: column; }
nav { display: flex; justify-content: space-between; align-items: center; padding: 24px 0 0; }

.lib-btn { background: none; border: 1px solid #D8D4CA; border-radius: 20px; padding: 5px 14px; cursor: pointer; font-size: 12px; color: #8a8a7a; font-family: 'Helvetica Neue', sans-serif; }

.screen { animation: fadeUp 0.3s ease; }

@keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.5);opacity:0.4} }

.step-bar { display: flex; gap: 5px; margin-bottom: 32px; }
.step-dot { height: 2px; border-radius: 2px; flex: 1; background: #D8D4CA; opacity: 0.25; transition: all 0.3s; }

// TMDB genre IDs
const GENRE_IDS = {
  action:28, adventure:12, animation:16, comedy:35, crime:80,
  documentary:99, drama:18, fantasy:14, horror:27, mystery:9648,
  romance:10749, scifi:878, thriller:53, western:37, war:10752,

};
const PLATFORM_IDS = {Netflix:8,"Disney+":337,"Amazon Prime":9,"Apple TV+":350,BluTV:341,YouTube:192,Gain:342};

// Mood → genre mapping
const MOOD_GENRES = {
  rahat:    {movie:[35,10749,16,10751], tv:[35,10766,16]},
  gulddur:  {movie:[35,10770,10751],    tv:[35]},
  heyecan:  {movie:[28,53,80,878],      tv:[80,9648,10759]},
  duygu:    {movie:[18,10749,10751],    tv:[18,10766]},
  dusundur: {movie:[878,9648,18,36],    tv:[9648,10765,18]},
  aksiyon:  {movie:[28,12,14,10752],    tv:[10759,10765]},
};

// Country codes for TMDB
const COUNTRY_CODES = {
  TR:"TR", KR:"KR", FR:"FR", US:"US", GB:"GB",
  JP:"JP", IT:"IT", ES:"ES", DE:"DE", IN:"IN",
};

// ── State ───────────────────────────────────────────────────────────────────
let state = {
  lang:"TR", view:"main", step:0,
  type:null, mood:null, genre:null, who:null, time:null,
  country:null, era:null, minRating:6.0,
  platforms:[],
  result:null, loading:false, error:null, shownIds:[],
  favorites: tryParse("t_favs",[]),
  watched:   tryParse("t_wtch",[]),
};

function tryParse(k,d){ try{return JSON.parse(localStorage.getItem(k)||"null")||d}catch{return d} }
function save(k,v){ try{localStorage.setItem(k,JSON.stringify(v))}catch{} }
function saveFavs(a){ state.favorites=a; save("t_favs",a); }
function saveWtch(a){ state.watched=a;   save("t_wtch",a); }
function isFaved(id){ return state.favorites.some(f=>f.id===id); }
function isWatched(id){ return state.watched.includes(id); }

// ── API ─────────────────────────────────────────────────────────────────────
async function tmdbFetch(path, params){
  const url = new URL(TMDB+path);
  url.searchParams.set("language", state.lang==="TR"?"tr-TR":"en-US");
  url.searchParams.set("api_key", TMDB_KEY);
  if(params) Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,String(v)));

  // Try direct
  try {
    const r = await fetch(url.toString(), {headers:{"Authorization":"Bearer "+TMDB_TOKEN}});
    if(r.ok) return r.json();
  } catch(e){}

  // Proxy fallback
  try {
    const r2 = await fetch("https://api.allorigins.win/get?url="+encodeURIComponent(url.toString()));
    if(r2.ok){ const w=await r2.json(); return JSON.parse(w.contents); }
  } catch(e){}

  const r3 = await fetch("https://corsproxy.io/?"+encodeURIComponent(url.toString()));
  if(!r3.ok) throw new Error("Bağlantı hatası: "+r3.status);
  return r3.json();
}

async function findMovie(){
  state.loading=true; state.error=null; state.result=null; render();
  const s=state;
  const tmdbType = s.type==="series"?"tv":"movie";
  const isDoc    = s.type==="documentary";

  // Genre IDs: specific genre OR mood-based
  let genreIds = [];
  if(isDoc){
    genreIds=[99];
  } else if(s.genre && s.genre!=="any"){
    genreIds=[GENRE_IDS[s.genre]||35];
  } else if(s.mood){
    genreIds=MOOD_GENRES[s.mood]?.[tmdbType]||[];
  }

  // Rating filter
  const minVote = s.minRating||6.0;
  const minCount = minVote>=8.0 ? 1000 : 300;

  // Era → year range
  let dateGte="", dateLte="";
  if(s.era==="classic"){ dateGte="1950-01-01"; dateLte="1999-12-31"; }
  else if(s.era==="2000s"){ dateGte="2000-01-01"; dateLte="2014-12-31"; }
  else if(s.era==="recent"){ dateGte="2015-01-01"; dateLte="2022-12-31"; }
  else if(s.era==="new"){    dateGte="2023-01-01"; }

  // Runtime
  const runtimes={"1saat":[0,95],"2saat":[60,155],"3saat":[100,999],"siniryok":[0,999]};
  const [minRT,maxRT]=runtimes[s.time]||[0,999];

  const params = {
    sort_by: minVote>=8.0 ? "vote_average.desc" : "popularity.desc",
    "vote_count.gte": minCount,
    "vote_average.gte": minVote,
    page: Math.floor(Math.random()*6)+1,
  };

  if(genreIds.length>0) params.with_genres=genreIds.join("|");
  if(s.country && s.country!=="any") params.with_origin_country=COUNTRY_CODES[s.country]||s.country;
  if(dateGte) params[tmdbType==="movie"?"primary_release_date.gte":"first_air_date.gte"]=dateGte;
  if(dateLte) params[tmdbType==="movie"?"primary_release_date.lte":"first_air_date.lte"]=dateLte;
  if(tmdbType==="movie"){
    if(minRT>0) params["with_runtime.gte"]=minRT;
    if(maxRT<999) params["with_runtime.lte"]=maxRT;
  }
  if(s.platforms.length>0){
    const ids=s.platforms.map(p=>PLATFORM_IDS[p]).filter(Boolean);
    if(ids.length>0){ params.with_watch_providers=ids.join("|"); params.watch_region="TR"; }
  }

  const allExclude=[...s.shownIds,...s.watched];

  try {
    let data = await tmdbFetch("/discover/"+tmdbType, params);
    let results=(data.results||[]).filter(r=>!allExclude.includes(r.id));

    if(results.length===0){
      // Relax filters: drop country/era, keep genre
      const p2={...params,page:1};
      delete p2.with_origin_country;
      delete p2["primary_release_date.gte"]; delete p2["primary_release_date.lte"];
      delete p2["first_air_date.gte"]; delete p2["first_air_date.lte"];
      data=await tmdbFetch("/discover/"+tmdbType,p2);
      results=(data.results||[]).filter(r=>!allExclude.includes(r.id));
    }
    if(results.length===0){
      data=await tmdbFetch("/"+tmdbType+"/popular");
      results=(data.results||[]).filter(r=>!allExclude.includes(r.id));
    }
    if(results.length===0) throw new Error(s.lang==="TR"?"Uygun içerik bulunamadı. Filtreleri değiştirip tekrar dene.":"No content found. Try changing your filters.");

    const pick=results[Math.floor(Math.random()*Math.min(results.length,12))];
    const details=await tmdbFetch("/"+tmdbType+"/"+pick.id,{append_to_response:"credits,watch/providers,external_ids"});

    const title   =details.title||details.name||"";
    const origTitle=details.original_title||details.original_name||"";
    const year    =(details.release_date||details.first_air_date||"").slice(0,4);
    const overview=details.overview||"";
    const rating  =details.vote_average?details.vote_average.toFixed(1):"—";
    const poster  =details.poster_path?IMG+details.poster_path:null;
    const backdrop=details.backdrop_path?IMG_BG+details.backdrop_path:null;
    const duration=details.runtime?details.runtime+(s.lang==="TR"?" dk":" min")
                  :details.number_of_seasons?details.number_of_seasons+(s.lang==="TR"?" sezon":" seasons"):"";
    const credits =details.credits||{};
    const cast    =(credits.cast||[]).slice(0,3).map(a=>a.name).join(", ");
    const director=(credits.crew||[]).find(c=>c.job==="Director")?.name
                  ||(details.created_by||[]).map(c=>c.name).join(", ")||"";
    const genres  =(details.genres||[]).map(g=>g.name).join(" / ");
    const country =(details.production_countries||[]).map(c=>c.name).join(", ")
                  ||(details.origin_country||[]).join(", ");
    const wpTR    =details["watch/providers"]?.results?.TR;
    const platform=(wpTR?.flatrate||[]).slice(0,2).map(p=>p.provider_name).join(" / ")
                  ||(s.platforms.length>0?s.platforms[0]:"—");
    const imdbId  =details.external_ids?.imdb_id||"";

    state.shownIds.push(pick.id);
    state.result={id:pick.id,title,origTitle,year,overview,rating,poster,backdrop,duration,cast,director,genres,country,platform,imdbId};
    state.step=TOTAL;
  } catch(e){
    state.error=e.message;
    state.step=TOTAL;
  }
  state.loading=false;
  render();
}

  {id:"comedy",emoji:"😄",TR:"Komedi",EN:"Comedy"},{id:"crime",emoji:"🔍",TR:"Suç/Gizem",EN:"Crime"},
  {id:"drama",emoji:"🎭",TR:"Drama",EN:"Drama"},{id:"fantasy",emoji:"🧙",TR:"Fantazi",EN:"Fantasy"},
  {id:"scifi",emoji:"🚀",TR:"Bilim Kurgu",EN:"Sci-Fi"},{id:"thriller",emoji:"⚡",TR:"Gerilim",EN:"Thriller"},
  {id:"mystery",emoji:"🕵️",TR:"Gizem",EN:"Mystery"},{id:"romance",emoji:"🌹",TR:"Romantik",EN:"Romance"},
  {id:"any",emoji:"🎲",TR:"Sürpriz et",EN:"Surprise me"},
];
const GENRES_DOC=[
  {id:"documentary",emoji:"🌿",TR:"Doğa & Bilim",EN:"Nature & Science"},
  {id:"crime",emoji:"🔍",TR:"Gerçek Suç",EN:"True Crime"},
  {id:"history",emoji:"📜",TR:"Tarih",EN:"History"},
  {id:"music",emoji:"🎵",TR:"Müzik & Sanat",EN:"Music & Art"},
  {id:"any",emoji:"🎲",TR:"Sürpriz et",EN:"Surprise me"},
];
const WHO=[
  {id:"yalniz",   emoji:"🧍",TR:"Yalnız",    EN:"Solo"},
  {id:"sevgilim", emoji:"💑",TR:"Sevgilim",  EN:"Partner"},
  {id:"arkadaslar",emoji:"👥",TR:"Arkadaşlar",EN:"Friends"},
];
const TIME=[
  {id:"1saat",   TR:"~1 saat",  EN:"~1 hour"},
  {id:"2saat",   TR:"~2 saat",  EN:"~2 hours"},
  {id:"3saat",   TR:"3+ saat",  EN:"3+ hours"},
  {id:"siniryok",TR:"Sınır yok",EN:"No limit"},
];
const COUNTRIES=[
  {id:"any",emoji:"🌍",TR:"Farketmez",EN:"Any country"},
  {id:"TR", emoji:"🇹🇷",TR:"Türkiye",  EN:"Turkey"},
  {id:"US", emoji:"🇺🇸",TR:"Amerika",  EN:"USA"},
  {id:"KR", emoji:"🇰🇷",TR:"Kore",     EN:"Korea"},
  {id:"GB", emoji:"🇬🇧",TR:"İngiltere",EN:"UK"},
  {id:"FR", emoji:"🇫🇷",TR:"Fransa",   EN:"France"},
  {id:"JP", emoji:"🇯🇵",TR:"Japonya",  EN:"Japan"},
  {id:"IT", emoji:"🇮🇹",TR:"İtalya",   EN:"Italy"},
  {id:"ES", emoji:"🇪🇸",TR:"İspanya",  EN:"Spain"},
  {id:"DE", emoji:"🇩🇪",TR:"Almanya",  EN:"Germany"},
  {id:"IN", emoji:"🇮🇳",TR:"Hindistan",EN:"India"},
];
const ERAS=[
  {id:"any",   emoji:"🎲",TR:"Farketmez",dTR:"",           EN:"Any era",    dEN:""},
  {id:"classic",emoji:"📽️",TR:"Klasikler",dTR:"1950 – 1999",EN:"Classics",  dEN:"1950 – 1999"},
  {id:"2000s", emoji:"💿",TR:"2000'ler", dTR:"2000 – 2014", EN:"2000s",     dEN:"2000 – 2014"},
  {id:"recent",emoji:"🎞️",TR:"Yakın dönem",dTR:"2015 – 2022",EN:"Recent",   dEN:"2015 – 2022"},
  {id:"new",   emoji:"🆕",TR:"Yeni çıkan",dTR:"2023+",      EN:"Brand new", dEN:"2023+"},
];
const RATINGS=[
  {id:6.0, TR:"6+ ⭐ Güzel",     EN:"6+ ⭐ Good"},
  {id:7.0, TR:"7+ ⭐⭐ İyi",     EN:"7+ ⭐⭐ Great"},
  {id:8.0, TR:"8+ ⭐⭐⭐ Harika",EN:"8+ ⭐⭐⭐ Excellent"},
  {id:8.5, TR:"8.5+ 🏆 En iyiler",EN:"8.5+ 🏆 All-time greats"},
];
const PLATS=["Netflix","Disney+","Amazon Prime","BluTV","Apple TV+","Gain","YouTube"];

// ── Helpers ─────────────────────────────────────────────────────────────────
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function dc(item,sel,onclick,compact){
  const l=state.lang;
  const lbl=item[l]||item.TR;
  const sub=item["d"+l]||item.dTR||"";
  return`<div class="dark-card${sel?" selected":""}" onclick="${onclick}">
    <span class="emoji">${item.emoji}</span>
    <div class="label">${esc(lbl)}</div>
    ${!compact&&sub?`<div class="sublabel">${esc(sub)}</div>`:""}
  </div>`;
}
function stepBar(s,total){
  let h='<div class="step-bar">';
  for(let i=0;i<total;i++) h+=`<div class="step-dot ${i<s?"done":i===s?"active":""}"></div>`;
  return h+"</div>";
}

// ── Actions ──────────────────────────────────────────────────────────────────
function setLang(l){
  state.lang=l;
  document.getElementById("btnTR").className="lang-btn"+(l==="TR"?" active":"");
  document.getElementById("btnEN").className="lang-btn"+(l==="EN"?" active":"");
  render();
}
function toggleView(v){ state.view=state.view===v?"main":v; render(); }
function restart(){ Object.assign(state,{view:"main",step:0,type:null,mood:null,genre:null,who:null,time:null,country:null,era:null,minRating:6.0,platforms:[],result:null,loading:false,error:null,shownIds:[]}); render(); }
function togglePlat(p){ const i=state.platforms.indexOf(p); if(i>=0)state.platforms.splice(i,1); else state.platforms.push(p); render(); }
function toggleFav(id,title,year,rating,platform,poster){ const n=isFaved(id)?state.favorites.filter(f=>f.id!==id):[...state.favorites,{id,title,year,rating,platform,poster}]; saveFavs(n); render(); }
function toggleWtch(id){ const n=isWatched(id)?state.watched.filter(x=>x!==id):[...state.watched,id]; saveWtch(n); render(); }
function markNext(id){ toggleWtch(id); doFetch([id]); }
function doFetch(ex){ state.shownIds=[...state.shownIds,...(ex||[])]; findMovie(); }
function skipStep(){ state.step++; render(); }

function goNext(){
  if(state.step===TOTAL-1) findMovie();
  else { state.step++; render(); }
}
function goBack(){
  if(state.view!=="main"){state.view="main";render();return;}
  if(state.step===TOTAL){state.step=TOTAL-1;state.result=null;state.error=null;render();return;}
  if(state.step>0){state.step--;render();}
}

// ── Render ───────────────────────────────────────────────────────────────────
const TX={
  TR:{back:"← Geri",change:"← Kriterleri değiştir",cont:"Devam →",find:"✦ Bu akşamki önerimi bul",
      loadT:"Mükemmel önerin aranıyor…",loadS:"Ruh halin, vakit ve zevkin eşleştiriliyor.",
      another:"🔄 Başka öneri",watched2:"✅ İzledim, başka öneri",startover:"← Başa dön",
      fav:"🤍 Favorile",favd:"❤️ Favoride",wtch:"⬜ İzledim",wtchd:"✅ İzlendi",
      dir:"🎬 Yönetmen:",cast:"⭐ Oyuncular:",
      lib:"Kitaplığım 📚",favs:"❤️ Favoriler",watched:"✅ İzlenenler",nope:"Henüz bir şey yok.",
      skip:"Bu adımı geç →",optional:"(isteğe bağlı)",retry:"Tekrar Dene",err:"Hata",
      minRating:"Minimum puan",country:"Yapım ülkesi",era:"Dönem",
  },
  EN:{back:"← Back",change:"← Change criteria",cont:"Continue →",find:"✦ Find my pick for tonight",
      loadT:"Finding your perfect pick…",loadS:"Matching your mood, time and taste.",
      another:"🔄 Another pick",watched2:"✅ Watched it, next pick",startover:"← Start over",
      fav:"🤍 Favorite",favd:"❤️ Favorited",wtch:"⬜ Mark watched",wtchd:"✅ Watched",
      dir:"🎬 Director:",cast:"⭐ Cast:",
      lib:"My Library 📚",favs:"❤️ Favorites",watched:"✅ Watched",nope:"Nothing here yet.",
      skip:"Skip this step →",optional:"(optional)",retry:"Try Again",err:"Error",
      minRating:"Minimum rating",country:"Country of origin",era:"Era",
  },
};

function render(){
  const s=state; const l=s.lang; const tx=TX[l];
  const lc=s.favorites.length+s.watched.length;
  const lb=document.getElementById("libBtn");
  if(lb){ lb.style.display=lc>0?"block":"none"; document.getElementById("libCount").textContent=lc; }
  const main=document.getElementById("main");

  // LIBRARY
  if(s.view==="library"){
    let h=`<div class="screen"><button class="back-btn" onclick="toggleView('library')">${tx.back}</button>
    <h2 style="font-size:24px;font-weight:400;font-style:italic;margin-bottom:20px;color:#1a1a1a">${tx.lib}</h2>`;
    if(s.favorites.length){
      h+=`<div class="section-title" style="color:#C4A35A">${tx.favs}</div>`;
      s.favorites.forEach(f=>{
        h+=`<div class="lib-item">${f.poster?`<img class="lib-poster" src="${esc(f.poster)}" alt="">`:""}
        <div class="lib-info"><div class="lib-title">${esc(f.title)}</div>
        <div class="lib-meta">${esc(f.year)}${f.rating?` · ★${f.rating}`:""}${f.platform?` · ${esc(f.platform)}`:""}</div></div>
        <button style="background:none;border:none;cursor:pointer;font-size:17px;padding:0 13px" onclick="toggleFav(${f.id},'','','','','')">❤️</button></div>`;
      });
    }
    if(s.watched.length){
      h+=`<div class="section-title" style="color:#8a8a7a;margin-top:${s.favorites.length?20:0}px">${tx.watched} (${s.watched.length})</div>
      <p style="font-size:13px;color:#666;font-family:'Helvetica Neue',sans-serif">${s.watched.length} ${l==="TR"?"içerik işaretlendi":"items marked"}</p>`;
    }
    if(!s.favorites.length&&!s.watched.length) h+=`<p style="color:#8a8a7a;font-size:14px;font-family:'Helvetica Neue',sans-serif">${tx.nope}</p>`;
    main.innerHTML=h+"</div>"; return;
  }

  // LOADING
  if(s.loading){
    main.innerHTML=`<div class="loading screen"><div style="font-size:54px">🎬</div>
    <div style="text-align:center"><p style="font-size:19px;font-style:italic;margin-bottom:6px">${tx.loadT}</p>
    <p style="font-size:14px;color:#8a8a7a;font-family:'Helvetica Neue',sans-serif">${tx.loadS}</p></div>
    <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`; return;
  }

  // RESULT
  if(!s.loading&&s.step===TOTAL){
    const r=s.result;
    let h=`<div class="screen"><button class="back-btn" onclick="goBack()">${tx.change}</button>`;
    if(s.error){
      h+=`<div class="error-box"><p style="color:#e05555;font-size:14px;font-weight:600;font-family:'Helvetica Neue',sans-serif;margin-bottom:6px">⚠️ ${tx.err}</p>
      <p style="color:#e05555;font-size:12px;font-family:'Helvetica Neue',sans-serif;margin-bottom:14px;line-height:1.5">${esc(s.error)}</p>
      <button class="find-btn" onclick="findMovie()">${tx.retry}</button></div>`;
    } else if(r){
      const faved=isFaved(r.id); const wtchd=isWatched(r.id);
      const fa=`${r.id},'${esc(r.title.replace(/'/g,"\\'"))}','${esc(r.year)}','${esc(r.rating)}','${esc(r.platform)}','${esc(r.poster||"")}'`;
      h+=`<div class="result-card">
        <div class="result-visual">
          ${r.backdrop?`<img class="result-backdrop" src="${esc(r.backdrop)}" alt="">`:""}
          ${r.poster?`<img class="result-poster" src="${esc(r.poster)}" alt="">`:""}
          <div class="result-info${!r.poster?" full":""}">
            <div class="rbadges">
              ${r.genres?`<span class="rbadge rbadge-g">${esc(r.genres.split(" / ")[0])}</span>`:""}
              ${r.year?`<span class="rbadge rbadge-y">${esc(r.year)}</span>`:""}
            </div>
            <div class="result-title">${esc(r.title)}</div>
            ${r.origTitle&&r.origTitle!==r.title?`<div class="result-orig">${esc(r.origTitle)}</div>`:""}
          </div>
        </div>
        <div class="result-body">
          <div class="meta-row">
            ${r.rating&&r.rating!=="0.0"?`<span class="meta meta-r">★ ${esc(r.rating)} TMDB</span>`:""}
            ${r.duration?`<span class="meta meta-i">⏱ ${esc(r.duration)}</span>`:""}
            ${r.platform&&r.platform!=="—"?`<span class="meta meta-i">${esc(r.platform)}</span>`:""}
            ${r.country?`<span class="meta meta-c">${esc(r.country.split(",")[0])}</span>`:""}
          </div>
          ${r.director||r.cast?`<div class="crew-box">
            ${r.director?`<div class="crew-line"><span class="crew-lbl">${tx.dir}</span> ${esc(r.director)}</div>`:""}
            ${r.cast?`<div class="crew-line"><span class="crew-lbl">${tx.cast}</span> ${esc(r.cast)}</div>`:""}
          </div>`:""}
          ${r.overview?`<p class="overview">${esc(r.overview)}</p>`:""}
          <div class="action-row">
            <button class="action-btn${faved?" faved":""}" onclick="toggleFav(${fa})">${faved?tx.favd:tx.fav}</button>
            <button class="action-btn${wtchd?" watched":""}" onclick="toggleWtch(${r.id})">${wtchd?tx.wtchd:tx.wtch}</button>
          </div>
        </div>
      </div>
      <div class="btn-stack">
        <button class="find-btn" onclick="doFetch([${r.id}])">${tx.another}</button>
        <button class="alt-btn" onclick="markNext(${r.id})">${tx.watched2}</button>
        <button class="outline-btn" onclick="restart()">${tx.startover}</button>
      </div>`;
    }
    main.innerHTML=h+"</div>"; return;
  }

  // STEPS
  const step=s.step;
  const genres = s.type==="series"?GENRES_SERIES:s.type==="documentary"?GENRES_DOC:GENRES_MOVIE;
  const canCont=[
    s.type, s.mood, s.genre, s.who&&s.time, s.country, s.era, s.minRating
  ][step]!==undefined && [
    s.type, s.mood, s.genre, s.who&&s.time, s.country, s.era, s.minRating
  ][step]!==null && [
    s.type, s.mood, s.genre, s.who&&s.time, s.country, s.era, s.minRating
  ][step]!==false;

  let h=`<div class="screen">${stepBar(step,TOTAL)}`;
  if(step>0) h+=`<button class="back-btn" onclick="goBack()">${tx.back}</button>`;

  // Step 0: İçerik türü
  if(step===0){
    h+=`<h1 class="q">${l==="TR"?"Bu akşam ne ":"Tonight let's "}<em>${l==="TR"?"izleyelim":"watch"}</em>${l==="TR"?"?":"?"}</h1>
    <p class="sub">${l==="TR"?"Film, dizi veya belgesel — birini seç.":"Movie, series or documentary — pick one."}</p>
    <div class="grid3">${TYPES.map(o=>dc(o,s.type===o.id,`state.type='${o.id}';render()`,false)).join("")}</div>`;
  }
  // Step 1: Ruh hali
  else if(step===1){
    h+=`<h1 class="q">${l==="TR"?"Şu an nasıl ":"How are you "}<em>${l==="TR"?"hissediyorsun":"feeling"}</em>${l==="TR"?"?":"?"}</h1>
    <p class="sub">${l==="TR"?"Ruh halin her şeyi belirliyor.":"Your mood shapes everything."}</p>
    <div class="grid2">${MOODS.map(o=>dc(o,s.mood===o.id,`state.mood='${o.id}';render()`,false)).join("")}</div>`;
  }
  // Step 2: Tür
  else if(step===2){
    h+=`<h1 class="q">${l==="TR"?"Hangi ":"Which "}<em>${l==="TR"?"türü":"genre"}</em>${l==="TR"?" istiyorsun?":" tonight?"}</h1>
    <p class="sub">${l==="TR"?"Bir tür seç veya sürpriz et.":"Pick a genre or let us surprise you."}</p>
    <div class="grid3">${genres.map(o=>dc(o,s.genre===o.id,`state.genre='${o.id}';render()`,true)).join("")}</div>`;
  }
  // Step 3: Kiminle + Vakit
  else if(step===3){
    h+=`<h1 class="q">${l==="TR"?"Kiminle ":"Who are you "}<em>${l==="TR"?"izliyorsun":"watching with"}</em>${l==="TR"?"?":"?"}</h1>
    <p class="sub">${l==="TR"?"Ve ne kadar vaktiniz var?":"And how much time?"}</p>
    <div class="grid3">${WHO.map(o=>dc(o,s.who===o.id,`state.who='${o.id}';render()`,true)).join("")}</div>
    <div class="section-title">${l==="TR"?"Ne kadar vakit var?":"How much time?"}</div>
    <div class="pills">${TIME.map(o=>`<button class="pill${s.time===o.id?" selected":""}" onclick="state.time='${o.id}';render()">${esc(o[l])}</button>`).join("")}</div>`;
  }
  // Step 4: Ülke
  else if(step===4){
    h+=`<h1 class="q">${l==="TR"?"Hangi ülkenin ":"Which country's "}<em>${l==="TR"?"yapımını":"films"}</em>${l==="TR"?" izlemek istiyorsun?":" do you prefer?"}</h1>
    <p class="sub">${l==="TR"?"İsteğe bağlı — farketmez diyebilirsin.":"Optional — you can always pick 'any'."}</p>
    <div class="grid3">${COUNTRIES.map(o=>dc(o,s.country===o.id,`state.country='${o.id}';render()`,true)).join("")}</div>`;
  }
  // Step 5: Dönem
  else if(step===5){
    h+=`<h1 class="q">${l==="TR"?"Hangi ":"Which "}<em>${l==="TR"?"dönemden":"era"}</em>${l==="TR"?"?":"?"}</h1>
    <p class="sub">${l==="TR"?"Klasikler mi, yeni çıkanlar mı?":"Classics or brand new releases?"}</p>
    <div class="grid2">${ERAS.map(o=>dc(o,s.era===o.id,`state.era='${o.id}';render()`,false)).join("")}</div>`;
  }
  // Step 6: Platform + Puan
  else if(step===6){
    h+=`<h1 class="q">${l==="TR"?"Son olarak ":"Almost there — "}<em>${l==="TR"?"platformun":"your platform"}</em>${l==="TR"?"?":"?"}</h1>
    <p class="sub">${l==="TR"?"Hepsini seçebilirsin. Puan filtresini de ayarlayabilirsin.":"Select all you have. Optionally set a minimum rating."}</p>
    <div class="section-title">${l==="TR"?"Platform":"Platform"}</div>
    <div class="pills" style="margin-bottom:20px">${PLATS.map(p=>`<button class="pill${s.platforms.includes(p)?" selected":""}" onclick="togglePlat('${p}')">${esc(p)}</button>`).join("")}</div>
    <div class="section-title">${tx.minRating}</div>
    <div class="pills">${RATINGS.map(r=>`<button class="pill${s.minRating===r.id?" selected":""}" onclick="state.minRating=${r.id};render()">${esc(r[l])}</button>`).join("")}</div>`;
  }

  // Buttons
  const isLast = step===TOTAL-1;
  const skipable = step>=4; // country, era, platform are skippable
  h+=`<button class="cont-btn${canCont?" active":""}" onclick="${canCont?"goNext()":""}">${isLast?tx.find:tx.cont}</button>`;
  if(skipable&&!isLast) h+=`<div class="skip-link"><button onclick="skipStep()">${tx.skip}</button></div>`;
  main.innerHTML=h+"</div>";
}

render();
</script>
