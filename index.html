var RATS=[{v:6.0,TR:“6+ Guzel”,EN:“6+ Good”},{v:7.0,TR:“7+ Iyi”,EN:“7+ Great”},{v:8.0,TR:“8+ Harika”,EN:“8+ Excellent”},{v:8.5,TR:“8.5+ En iyiler”,EN:“8.5+ All-time greats”}];
var PLTS=[“Netflix”,“Disney+”,“Amazon Prime”,“BluTV”,“Apple TV+”,“Gain”,“YouTube”];

function esc(s){return String(s||””).replace(/&/g,”&”).replace(/</g,”<”).replace(/>/g,”>”)}
function sbar(c,t){var h=’<div class="sbar">’;for(var i=0;i<t;i++)h+=’<div class=“sd ‘+(i<c?“done”:i===c?“cur”:””)+’”></div>’;return h+”</div>”}
function card(item,sel,field){var l=S.lang;var on=sel===item.id;var sub=item[“d”+l]||item.dTR||””;return’<div class=“dc’+(on?” on”:””)+’” onclick=“pick('’+field+’','’+item.id+’')” style=“user-select:none”><span class="em">’+item.em+’</span><div class="lb2">’+esc(item[l]||item.TR)+’</div>’+(sub?’<div class="sl">’+esc(sub)+’</div>’:’’)+’</div>’}

function render(){
var l=S.lang;var tr=l===“TR”;
var lc=S.favs.length+S.wtch.length;
var lb=document.getElementById(“libBtn”);
lb.style.display=lc>0?“block”:“none”;
document.getElementById(“libN”).textContent=lc;
var M=document.getElementById(“M”);

if(S.view===“lib”){
var h=’<div class="screen"><button class="bb" onclick="toggleLib()">’+(tr?“Geri”:“Back”)+’</button>’;
h+=’<h2 style="font-size:24px;font-weight:400;font-style:italic;margin-bottom:20px;color:#1a1a1a">’+(tr?“Kitabligim”:“My Library”)+’</h2>’;
if(S.favs.length){
h+=’<div class="stitle" style="color:#C4A35A">Favoriler</div>’;
S.favs.forEach(function(f){
h+=’<div style="background:#1C1C1E;border-radius:12px;margin-bottom:10px;overflow:hidden;display:flex;align-items:center">’+(f.post?’<img src="'+esc(f.post)+'" style="width:48px;height:72px;object-fit:cover;flex-shrink:0" alt="">’:””);
h+=’<div style="padding:10px 13px;flex:1;min-width:0"><div style="font-size:14px;font-style:italic;color:#E5E5E5;font-family:Georgia,serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">’+esc(f.title)+’</div>’;
h+=’<div style="font-size:11px;color:#888;font-family:Helvetica Neue,sans-serif;margin-top:2px">’+esc(f.year||””)+(f.rat?” - “+f.rat:””)+(f.plat?” - “+esc(f.plat):””)+’</div></div>’;
h+=’<button onclick="savF(S.favs.filter(function(x){return x.id!=='+f.id+'}));render()" style="background:none;border:none;cursor:pointer;font-size:17px;padding:0 13px">X</button></div>’;
});
}
if(S.wtch.length){h+=’<div class="stitle" style="color:#8a8a7a;margin-top:20px">Izlenenler (’+S.wtch.length+’)</div>’;}
M.innerHTML=h+”</div>”;return;
}

if(S.loading){
M.innerHTML=’<div class="loading screen"><div style="font-size:54px">🎬</div><div><p style="font-size:19px;font-style:italic;margin-bottom:6px">’+(tr?“Mukemmel onerin araniyor”:“Finding your perfect pick”)+’</p><p style="font-size:14px;color:#8a8a7a;font-family:Helvetica Neue,sans-serif">’+(tr?“Ruh halin, vakit ve zevkin eslestiriliyor.”:“Matching your mood, time and taste.”)+’</p></div><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>’;
return;
}

if(S.step===7){
var r=S.res;
var h=’<div class="screen"><button class="bb" onclick="goBack()">’+(tr?“Kriterleri degistir”:“Change criteria”)+’</button>’;
if(S.err){
h+=’<div class="ebox"><p style="color:#e05555;font-size:14px;font-weight:600;font-family:Helvetica Neue,sans-serif;margin-bottom:6px">Hata</p><p style="color:#e05555;font-size:12px;font-family:Helvetica Neue,sans-serif;margin-bottom:14px;line-height:1.5">’+esc(S.err)+’</p><button class="fbtn" onclick="doFind()">’+(tr?“Tekrar Dene”:“Try Again”)+’</button></div>’;
}else if(r){
var fv=isFav(r.id);var wt=isW(r.id);
h+=’<div class="rcard"><div class="rvis">’;
if(r.back)h+=’<img class="rbg" src="'+esc(r.back)+'" alt="">’;
if(r.post)h+=’<img class="rpost" src="'+esc(r.post)+'" alt="">’;
h+=’<div class=“rinf’+(r.post?””:” full”)+’”>’;
h+=’<div class="rbadges">’;
if(r.gen)h+=’<span class="rb g">’+esc(r.gen.split(”/”)[0].trim())+’</span>’;
if(r.year)h+=’<span class="rb y">’+esc(r.year)+’</span>’;
h+=’</div><div class="rtit">’+esc(r.title)+’</div>’;
if(r.orig&&r.orig!==r.title)h+=’<div class="rorig">’+esc(r.orig)+’</div>’;
h+=’</div></div><div class="rbody"><div class="mrow">’;
if(r.rat)h+=’<span class="m mr">★ ‘+esc(r.rat)+’ TMDB</span>’;
if(r.dur)h+=’<span class="m mi">’+esc(r.dur)+’</span>’;
if(r.plat)h+=’<span class="m mi">’+esc(r.plat)+’</span>’;
if(r.coun)h+=’<span class="m mc">’+esc(r.coun.split(”,”)[0])+’</span>’;
h+=’</div>’;
if(r.dir||r.cast){
h+=’<div class="crew">’;
if(r.dir)h+=’<div class="cl"><span class="clb">’+(tr?“Yonetmen: “:“Director: “)+’</span>’+esc(r.dir)+’</div>’;
if(r.cast)h+=’<div class="cl"><span class="clb">’+(tr?“Oyuncular: “:“Cast: “)+’</span>’+esc(r.cast)+’</div>’;
h+=’</div>’;
}
if(r.ov)h+=’<p class="ov">’+esc(r.ov)+’</p>’;
h+=’<div class="arow">’;
h+=’<button class=“ab’+(fv?” fav”:””)+’” onclick=“if(isFav(’+r.id+’))savF(S.favs.filter(function(f){return f.id!==’+r.id+’}));else savF(S.favs.concat([{id:’+r.id+’,title:'’+esc(r.title.replace(/’/g,””))+’',year:'’+r.year+’',rat:'’+r.rat+’',plat:'’+esc(r.plat||””)+’',post:'’+esc(r.post||””)+’'}]));render()”>’+(fv?(tr?“Favoride”:“Favorited”):(tr?“Favorile”:“Favorite”))+’</button>’;
h+=’<button class=“ab’+(wt?” wtc”:””)+’” onclick=“if(isW(’+r.id+’))savW(S.wtch.filter(function(x){return x!==’+r.id+’}));else savW(S.wtch.concat([’+r.id+’]));render()”>’+(wt?(tr?“Izlendi”:“Watched”):(tr?“Izledim”:“Mark watched”))+’</button>’;
h+=’</div></div></div>’;
h+=’<div class="bstack"><button class="fbtn" onclick="S.shown.push('+r.id+');doFind()">’+(tr?“Baska oneri”:“Another pick”)+’</button>’;
h+=’<button class="abtn" onclick="savW(S.wtch.concat(['+r.id+']));S.shown.push('+r.id+');doFind()">’+(tr?“Izledim, baska oneri”:“Watched it, next pick”)+’</button>’;
h+=’<button class="obtn" onclick="restart()">’+(tr?“Basa don”:“Start over”)+’</button></div>’;
}
M.innerHTML=h+”</div>”;return;
}

var step=S.step;
var genres=S.type===“series”?GS:S.type===“documentary”?GD:GM;
var can=[S.type,S.mood,S.genre,S.who&&S.time,S.country,S.era,true][step];
var isLast=step===6;
var skipOk=step>=4&&step<6;

var h=’<div class="screen">’+sbar(step,7);
if(step>0)h+=’<button class="bb" onclick="goBack()">’+(tr?“Geri”:“Back”)+’</button>’;

if(step===0){h+=’<h1>’+(tr?“Bu aksam ne <em>izleyelim</em>?”:“Tonight let's <em>watch</em>?”)+’</h1><p class="sub">’+(tr?“Film, dizi veya belgesel - birini sec.”:“Movie, series or documentary - pick one.”)+’</p><div class="g3">’+TYPES.map(function(o){return card(o,S.type,“type”)}).join(””)+’</div>’;}
else if(step===1){h+=’<h1>’+(tr?“Su an nasil <em>hissediyorsun</em>?”:“How are you <em>feeling</em>?”)+’</h1><p class="sub">’+(tr?“Ruh halin her seyi belirliyor.”:“Your mood shapes everything.”)+’</p><div class="g2">’+MOODS.map(function(o){return card(o,S.mood,“mood”)}).join(””)+’</div>’;}
else if(step===2){h+=’<h1>’+(tr?“Hangi <em>turu</em> istiyorsun?”:“Which <em>genre</em> tonight?”)+’</h1><p class="sub">’+(tr?“Bir tur sec veya surpriz et.”:“Pick a genre or surprise me.”)+’</p><div class="g3">’+genres.map(function(o){return card(o,S.genre,“genre”)}).join(””)+’</div>’;}
else if(step===3){
h+=’<h1>’+(tr?“Kiminle <em>izliyorsun</em>?”:“Who are you <em>watching with</em>?”)+’</h1><p class="sub">’+(tr?“Ve ne kadar vaktiniz var?”:“And how much time?”)+’</p><div class="g3">’+WHO.map(function(o){return card(o,S.who,“who”)}).join(””)+’</div>’;
h+=’<div class="stitle">’+(tr?“Ne kadar vakit var?”:“How much time?”)+’</div>’;
h+=’<div class="pills">’+TIME.map(function(o){return’<button class=“pill’+(S.time===o.id?” on”:””)+’” onclick=“pick('time','’+o.id+’')”>’+esc(o[l])+’</button>’}).join(””)+’</div>’;
}
else if(step===4){h+=’<h1>’+(tr?“Hangi ulkenin <em>yapimi</em>?”:“Which country's <em>films</em>?”)+’</h1><p class="sub">’+(tr?“Isteye bagli.”:“Optional.”)+’</p><div class="g3">’+CTRS.map(function(o){return card(o,S.country,“country”)}).join(””)+’</div>’;}
else if(step===5){h+=’<h1>’+(tr?“Hangi <em>donemden</em>?”:“Which <em>era</em>?”)+’</h1><p class="sub">’+(tr?“Klasikler mi, yeni cikanlar mi?”:“Classics or brand new?”)+’</p><div class="g2">’+ERAS.map(function(o){return card(o,S.era,“era”)}).join(””)+’</div>’;}
else if(step===6){
h+=’<h1>’+(tr?“Son olarak <em>platformun</em>?”:“Almost there - <em>platform</em>?”)+’</h1><p class="sub">’+(tr?“Isteye bagli. Puan filtresi de ekleyebilirsin.”:“Optional. Add a rating filter too.”)+’</p>’;
h+=’<div class="stitle">Platform</div><div class="pills">’+PLTS.map(function(p){return’<button class=“pill’+(S.plats.indexOf(p)>=0?” on”:””)+’” onclick=“togPlat('’+p+’')”>’+esc(p)+’</button>’}).join(””)+’</div>’;
h+=’<div class="stitle">’+(tr?“Minimum puan”:“Min. rating”)+’</div><div class="pills">’+RATS.map(function(r){return’<button class=“pill’+(S.minR===r.v?” on”:””)+’” onclick=“pick('minR',’+r.v+’)”>’+esc(r[l])+’</button>’}).join(””)+’</div>’;
}

if(isLast){h+=’<button class="fbtn" onclick="doFind()">’+(tr?“Bu aksamki onerimi bul”:“Find my pick for tonight”)+’</button>’;}
else{h+=’<button class=“cbtn’+(can?” on”:””)+’” onclick=“if(’+(can?1:0)+’)goNext()”>’+(tr?“Devam”:“Continue”)+’</button>’;}
if(skipOk)h+=’<div class="skip"><button onclick="skipStep()">’+(tr?“Bu adimi gec”:“Skip this step”)+’</button></div>’;

M.innerHTML=h+”</div>”;
}

render();
</script>

</body>
</html>
