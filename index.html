async function tfetch(path,params){
var url=new URL(TBASE+path);
url.searchParams.set(“language”,S.lang===“TR”?“tr-TR”:“en-US”);
url.searchParams.set(“api_key”,TKEY);
if(params){Object.keys(params).forEach(function(k){url.searchParams.set(k,String(params[k]));})}
try{var r=await fetch(url.toString(),{headers:{“Authorization”:“Bearer “+TTOKEN}});if(r.ok)return r.json();}catch(e){}
try{var r2=await fetch(“https://api.allorigins.win/get?url=”+encodeURIComponent(url.toString()));if(r2.ok){var w=await r2.json();return JSON.parse(w.contents);}}catch(e){}
var r3=await fetch(“https://corsproxy.io/?”+encodeURIComponent(url.toString()));
if(!r3.ok)throw new Error(“HTTP “+r3.status);
return r3.json();
}

async function findMovie(){
S.loading=true;S.error=null;S.result=null;render();
var tt=S.type===“series”?“tv”:“movie”;
var isDoc=S.type===“documentary”;
var gids=[];
if(isDoc){gids=[99];}
else if(S.genre&&S.genre!==“any”){gids=[GID[S.genre]||35];}

var minV=S.minR||6.0;
var p={sort_by:minV>=8?“vote_average.desc”:“popularity.desc”,“vote_count.gte”:minV>=8?1000:300,“vote_average.gte”:minV,page:Math.floor(Math.random()*6)+1};

if(S.country&&S.country!==“any”)p.with_origin_country=CCODES[S.country]||S.country;

else if(S.era===“new”){dGte=“2023-01-01”;}
if(dGte)p[tt===“movie”?“primary_release_date.gte”:“first_air_date.gte”]=dGte;

var tmap={“1saat”:[0,95],“2saat”:[60,155],“3saat”:[100,999],“siniryok”:[0,999]};
var rt=tmap[S.time]||[0,999];
if(tt===“movie”&&rt[0]>0)p[“with_runtime.gte”]=rt[0];
if(tt===“movie”&&rt[1]<999)p[“with_runtime.lte”]=rt[1];
if(S.platforms.length){var ids=S.platforms.map(function(x){return PID[x]}).filter(Boolean);if(ids.length){p.with_watch_providers=ids.join(”|”);p.watch_region=“TR”;}}
var excl=S.shown.concat(S.wtch);
try{
var d=await tfetch(”/discover/”+tt,p);
var res=(d.results||[]).filter(function(r){return!excl.includes(r.id)});
if(!res.length){var p2=Object.assign({},p);delete p2.with_origin_country;delete p2[“primary_release_date.gte”];delete p2[“primary_release_date.lte”];delete p2[“first_air_date.gte”];delete p2[“first_air_date.lte”];p2.page=1;d=await tfetch(”/discover/”+tt,p2);res=(d.results||[]).filter(function(r){return!excl.includes(r.id)});}
if(!res.length){d=await tfetch(”/”+tt+”/popular”,{});res=(d.results||[]).filter(function(r){return!excl.includes(r.id)});}
if(!res.length)throw new Error(S.lang===“TR”?“Uygun içerik bulunamadı. Filtreleri değiştir.”:“No content found. Try changing filters.”);
var pick=res[Math.floor(Math.random()*Math.min(res.length,12))];
var det=await tfetch(”/”+tt+”/”+pick.id,{append_to_response:“credits,watch/providers,external_ids”});
var title=det.title||det.name||””;
var orig=det.original_title||det.original_name||””;
var year=(det.release_date||det.first_air_date||””).slice(0,4);

var GDOC=[
{id:“documentary”,em:“🌿”,TR:“Doğa & Bilim”,EN:“Nature & Science”},{id:“crime”,em:“🔍”,TR:“Gerçek Suç”,EN:“True Crime”},
{id:“history”,em:“📜”,TR:“Tarih”,EN:“History”},{id:“music”,em:“🎵”,TR:“Müzik & Sanat”,EN:“Music & Art”},
{id:“any”,em:“🎲”,TR:“Sürpriz”,EN:“Surprise me”},
];
var WHO=[
{id:“yalniz”,em:“🧍”,TR:“Yalnız”,EN:“Solo”},
{id:“sevgilim”,em:“💑”,TR:“Sevgilim”,EN:“Partner”},
{id:“arkadaslar”,em:“👥”,TR:“Arkadaşlar”,EN:“Friends”},
];
var TIME=[
{id:“1saat”,TR:“~1 saat”,EN:“~1 hour”},{id:“2saat”,TR:“~2 saat”,EN:“~2 hours”},
{id:“3saat”,TR:“3+ saat”,EN:“3+ hours”},{id:“siniryok”,TR:“Sınır yok”,EN:“No limit”},
];
var COUNTRIES=[
{id:“any”,em:“🌍”,TR:“Farketmez”,EN:“Any”},{id:“TR”,em:“🇹🇷”,TR:“Türkiye”,EN:“Turkey”},
{id:“US”,em:“🇺🇸”,TR:“Amerika”,EN:“USA”},{id:“KR”,em:“🇰🇷”,TR:“Kore”,EN:“Korea”},
{id:“GB”,em:“🇬🇧”,TR:“İngiltere”,EN:“UK”},{id:“FR”,em:“🇫🇷”,TR:“Fransa”,EN:“France”},
{id:“JP”,em:“🇯🇵”,TR:“Japonya”,EN:“Japan”},{id:“IT”,em:“🇮🇹”,TR:“İtalya”,EN:“Italy”},
{id:“ES”,em:“🇪🇸”,TR:“İspanya”,EN:“Spain”},{id:“DE”,em:“🇩🇪”,TR:“Almanya”,EN:“Germany”},
{id:“IN”,em:“🇮🇳”,TR:“Hindistan”,EN:“India”},
];
var ERAS=[
{id:“any”,em:“🎲”,TR:“Farketmez”,EN:“Any era”,dTR:””,dEN:””},
{id:“classic”,em:“📽️”,TR:“Klasikler”,EN:“Classics”,dTR:“1950 – 1999”,dEN:“1950 – 1999”},
{id:“s2000”,em:“💿”,TR:“2000ler”,EN:“2000s”,dTR:“2000 – 2014”,dEN:“2000 – 2014”},
{id:“recent”,em:“🎞️”,TR:“Yakın dönem”,EN:“Recent”,dTR:“2015 – 2022”,dEN:“2015 – 2022”},
{id:“new”,em:“🆕”,TR:“Yeni çıkan”,EN:“Brand new”,dTR:“2023+”,dEN:“2023+”},
];
var RATINGS=[
{id:6.0,TR:“6+ Güzel”,EN:“6+ Good”},{id:7.0,TR:“7+ İyi”,EN:“7+ Great”},
{id:8.0,TR:“8+ Harika”,EN:“8+ Excellent”},{id:8.5,TR:“8.5+ En iyiler”,EN:“8.5+ All-time greats”},
];
var PLATS=[“Netflix”,“Disney+”,“Amazon Prime”,“BluTV”,“Apple TV+”,“Gain”,“YouTube”];

function e(s){return String(s||””).replace(/&/g,”&”).replace(/</g,”<”).replace(/>/g,”>”);}
function sbar(cur,tot){var h=’<div class="sbar">’;for(var i=0;i<tot;i++)h+=’<div class=“sd ‘+(i<cur?“done”:i===cur?“cur”:””)+’”></div>’;return h+”</div>”;}

function mkCard(item,selId,field,compact){
var l=S.lang;
var lbl=item[l]||item.TR;
var sub=(item[“d”+l]||item.dTR||””);
var isSel=(selId===item.id);
var html=’<div class=“dc’+(isSel?” on”:””)+’” data-id=”’+e(item.id)+’” data-field=”’+field+’”>’;
html+=’<span class="em">’+item.em+’</span>’;
html+=’<div class="lb">’+e(lbl)+’</div>’;
if(!compact&&sub)html+=’<div class="sl">’+e(sub)+’</div>’;
html+=’</div>’;
return html;
}

function render(){
var l=S.lang;
var lc=S.favs.length+S.wtch.length;
var lb=document.getElementById(“libBtn”);
lb.style.display=lc>0?“block”:“none”;
document.getElementById(“libN”).textContent=lc;
var main=document.getElementById(“main”);

// LIBRARY
if(S.view===“lib”){
var h=’<div class="screen"><button class="backbtn" id="goback">’+(l===“TR”?“← Geri”:“← Back”)+’</button>’;
h+=’<h2 style="font-size:24px;font-weight:400;font-style:italic;margin-bottom:20px">’+(l===“TR”?“Kitaplığım 📚”:“My Library 📚”)+’</h2>’;
if(S.favs.length){
h+=’<div class="stitle" style="color:#C4A35A">❤️ ‘+(l===“TR”?“Favoriler”:“Favorites”)+’</div>’;
S.favs.forEach(function(f){
h+=’<div class="li">’+(f.post?’<img class="lip" src="'+e(f.post)+'" alt="">’:’’);
h+=’<div class="lii"><div class="lit">’+e(f.title)+’</div><div class="lim">’+e(f.year||””)+(f.rat?” · ★”+f.rat:””)+(f.plat?” · “+e(f.plat):””)+’</div></div>’;
h+=’<button style="background:none;border:none;cursor:pointer;font-size:17px;padding:0 13px" data-fid="'+f.id+'">❤️</button></div>’;
});
}
if(S.wtch.length){
h+=’<div class="stitle" style="color:#8a8a7a;margin-top:'+(S.favs.length?20:0)+'px">✅ ‘+(l===“TR”?“İzlenenler”:“Watched”)+’ (’+S.wtch.length+’)</div>’;
h+=’<p style="font-size:13px;color:#666;font-family:Helvetica Neue,sans-serif">’+S.wtch.length+(l===“TR”?” içerik işaretlendi”:” items marked”)+’</p>’;
}
if(!S.favs.length&&!S.wtch.length)h+=’<p style="color:#8a8a7a;font-size:14px;font-family:Helvetica Neue,sans-serif">’+(l===“TR”?“Henüz bir şey yok.”:“Nothing here yet.”)+’</p>’;
main.innerHTML=h+’</div>’;
document.getElementById(“goback”).onclick=function(){S.view=“main”;render();};
main.querySelectorAll(”[data-fid]”).forEach(function(btn){
btn.onclick=function(){var id=parseInt(btn.dataset.fid);saveFavs(S.favs.filter(function(f){return f.id!==id}));render();};
});
return;
}

// LOADING
if(S.loading){
main.innerHTML=’<div class="loading screen"><div style="font-size:54px">🎬</div><div style="text-align:center"><p style="font-size:19px;font-style:italic;margin-bottom:6px">’+(l===“TR”?“Mükemmel önerin aranıyor…”:“Finding your perfect pick…”)+’</p><p style="font-size:14px;color:#8a8a7a;font-family:Helvetica Neue,sans-serif">’+(l===“TR”?“Ruh halin, vakit ve zevkin eşleştiriliyor.”:“Matching your mood, time and taste.”)+’</p></div><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>’;
return;
}

// RESULT
if(S.step===7){
var r=S.result;
var h=’<div class="screen"><button class="backbtn" id="goback">’+(l===“TR”?“← Kriterleri değiştir”:“← Change criteria”)+’</button>’;
if(S.error){
h+=’<div class="ebox"><p style="color:#e05555;font-size:14px;font-weight:600;font-family:Helvetica Neue,sans-serif;margin-bottom:6px">⚠️ ‘+(l===“TR”?“Hata”:“Error”)+’</p><p style="color:#e05555;font-size:12px;font-family:Helvetica Neue,sans-serif;margin-bottom:14px;line-height:1.5">’+e(S.error)+’</p><button class="fbtn" id="retry">’+(l===“TR”?“Tekrar Dene”:“Try Again”)+’</button></div>’;
} else if(r){
var faved=isFav(r.id); var wtchd=isWtch(r.id);
h+=’<div class="rcard"><div class="rvis">’;
if(r.back)h+=’<img class="rbg" src="'+e(r.back)+'" alt="">’;
if(r.post)h+=’<img class="rpost" src="'+e(r.post)+'" alt="">’;
h+=’<div class=“rinf’+(r.post?””:” full”)+’”>’;
h+=’<div class="rbadges">’;
if(r.gen)h+=’<span class="rbg2 g">’+e(r.gen.split(” / “)[0])+’</span>’;
if(r.year)h+=’<span class="rbg2 y">’+e(r.year)+’</span>’;
h+=’</div><div class="rtitle">’+e(r.title)+’</div>’;
if(r.orig&&r.orig!==r.title)h+=’<div class="rorig">’+e(r.orig)+’</div>’;
h+=’</div></div>’;
h+=’<div class="rbody"><div class="mrow">’;
if(r.rat&&r.rat!==“0.0”)h+=’<span class="m mr">★ ‘+e(r.rat)+’ TMDB</span>’;
if(r.dur)h+=’<span class="m mi">⏱ ‘+e(r.dur)+’</span>’;
if(r.plat&&r.plat!==”—”)h+=’<span class="m mi">’+e(r.plat)+’</span>’;
if(r.coun)h+=’<span class="m mc">’+e(r.coun.split(”,”)[0])+’</span>’;
h+=’</div>’;
if(r.dir||r.cast){
h+=’<div class="crew">’;
if(r.dir)h+=’<div class="cl"><span class="clb">’+(l===“TR”?“🎬 Yönetmen: “:“🎬 Director: “)+’</span>’+e(r.dir)+’</div>’;
if(r.cast)h+=’<div class="cl"><span class="clb">’+(l===“TR”?“⭐ Oyuncular: “:“⭐ Cast: “)+’</span>’+e(r.cast)+’</div>’;
h+=’</div>’;
}
if(r.ov)h+=’<p class="ov">’+e(r.ov)+’</p>’;
h+=’<div class="arow">’;
h+=’<button class=“abtn2’+(faved?” fav”:””)+’” id=“favBtn”>’+(faved?(l===“TR”?“❤️ Favoride”:“❤️ Favorited”):(l===“TR”?“🤍 Favorile”:“🤍 Favorite”))+’</button>’;
h+=’<button class=“abtn2’+(wtchd?” wtch”:””)+’” id=“wtchBtn”>’+(wtchd?(l===“TR”?“✅ İzlendi”:“✅ Watched”):(l===“TR”?“⬜ İzledim”:“⬜ Mark watched”))+’</button>’;
h+=’</div></div></div>’;
h+=’<div class="bstack"><button class="fbtn" id="anotherBtn">’+(l===“TR”?“🔄 Başka öneri”:“🔄 Another pick”)+’</button>’;
h+=’<button class="abtn" id="wtchNextBtn">’+(l===“TR”?“✅ İzledim, başka öneri”:“✅ Watched it, next pick”)+’</button>’;
h+=’<button class="obtn" id="restartBtn">’+(l===“TR”?“← Başa dön”:“← Start over”)+’</button></div>’;
}
main.innerHTML=h+’</div>’;
var gb=document.getElementById(“goback”);
if(gb)gb.onclick=function(){S.step=6;S.result=null;S.error=null;render();};
var rb=document.getElementById(“retry”);
if(rb)rb.onclick=function(){findMovie();};
if(r){
document.getElementById(“favBtn”).onclick=function(){
if(isFav(r.id)){saveFavs(S.favs.filter(function(f){return f.id!==r.id}));}
else{saveFavs(S.favs.concat([{id:r.id,title:r.title,year:r.year,rat:r.rat,plat:r.plat,post:r.post}]));}
render();
};
document.getElementById(“wtchBtn”).onclick=function(){
if(isWtch(r.id))saveWtch(S.wtch.filter(function(x){return x!==r.id}));
else saveWtch(S.wtch.concat([r.id]));
render();
};
document.getElementById(“anotherBtn”).onclick=function(){S.shown.push(r.id);findMovie();};
document.getElementById(“wtchNextBtn”).onclick=function(){saveWtch(S.wtch.concat([r.id]));S.shown.push(r.id);findMovie();};
document.getElementById(“restartBtn”).onclick=function(){restart();};
}
return;
}

// STEPS
var step=S.step;
var genres=S.type===“series”?GSERIES:S.type===“documentary”?GDOC:GMOVIE;
var canGo=[S.type,S.mood,S.genre,S.who&&S.time,S.country,S.era,true][step];
var isLast=step===6;
var skippable=step>=4&&step<6;

var h=’<div class="screen">’+sbar(step,7);
if(step>0)h+=’<button class="backbtn" id="goback">’+(S.lang===“TR”?“← Geri”:“← Back”)+’</button>’;

if(step===0){
h+=’<h1 class="q">’+(l===“TR”?“Bu akşam ne <em>izleyelim</em>?”:“Tonight let's <em>watch</em>?”)+’</h1>’;
h+=’<p class="sub">’+(l===“TR”?“Film, dizi veya belgesel — birini seç.”:“Movie, series or documentary — pick one.”)+’</p>’;
h+=’<div class="g3">’+TYPES.map(function(o){return mkCard(o,S.type,“type”,false)}).join(””)+’</div>’;
} else if(step===1){
h+=’<h1 class="q">’+(l===“TR”?“Şu an nasıl <em>hissediyorsun</em>?”:“How are you <em>feeling</em>?”)+’</h1>’;
h+=’<p class="sub">’+(l===“TR”?“Ruh halin her şeyi belirliyor.”:“Your mood shapes everything.”)+’</p>’;
h+=’<div class="g2">’+MOODS.map(function(o){return mkCard(o,S.mood,“mood”,false)}).join(””)+’</div>’;
} else if(step===2){
h+=’<h1 class="q">’+(l===“TR”?“Hangi <em>türü</em> istiyorsun?”:“Which <em>genre</em> tonight?”)+’</h1>’;
h+=’<p class="sub">’+(l===“TR”?“Bir tür seç veya sürpriz et.”:“Pick a genre or let us surprise you.”)+’</p>’;
h+=’<div class="g3">’+genres.map(function(o){return mkCard(o,S.genre,“genre”,true)}).join(””)+’</div>’;
} else if(step===3){
h+=’<h1 class="q">’+(l===“TR”?“Kiminle <em>izliyorsun</em>?”:“Who are you <em>watching with</em>?”)+’</h1>’;
h+=’<p class="sub">’+(l===“TR”?“Ve ne kadar vaktiniz var?”:“And how much time?”)+’</p>’;
h+=’<div class="g3">’+WHO.map(function(o){return mkCard(o,S.who,“who”,true)}).join(””)+’</div>’;
h+=’<div class="stitle">’+(l===“TR”?“Ne kadar vakit var?”:“How much time?”)+’</div>’;
h+=’<div class="pills">’+TIME.map(function(o){return’<button class=“pill’+(S.time===o.id?” on”:””)+’” data-id=”’+o.id+’” data-field=“time”>’+e(o[l])+’</button>’}).join(””)+’</div>’;
} else if(step===4){
h+=’<h1 class="q">’+(l===“TR”?“Hangi ülkenin <em>yapımı</em>?”:“Which country's <em>films</em>?”)+’</h1>’;
h+=’<p class="sub">’+(l===“TR”?“İsteğe bağlı.”:“Optional — pick any to skip.”)+’</p>’;
h+=’<div class="g3">’+COUNTRIES.map(function(o){return mkCard(o,S.country,“country”,true)}).join(””)+’</div>’;
} else if(step===5){
h+=’<h1 class="q">’+(l===“TR”?“Hangi <em>dönemden</em>?”:“Which <em>era</em>?”)+’</h1>’;
h+=’<p class="sub">’+(l===“TR”?“Klasikler mi, yeni çıkanlar mı?”:“Classics or brand new?”)+’</p>’;
h+=’<div class="g2">’+ERAS.map(function(o){return mkCard(o,S.era,“era”,false)}).join(””)+’</div>’;
} else if(step===6){
h+=’<h1 class="q">’+(l===“TR”?“Son olarak <em>platformun</em>?”:“Almost there — <em>platform</em>?”)+’</h1>’;
h+=’<p class="sub">’+(l===“TR”?“Platform ve minimum puan seç.”:“Choose platforms and minimum rating.”)+’</p>’;
h+=’<div class="stitle">’+(l===“TR”?“Platform (isteğe bağlı)”:“Platform (optional)”)+’</div>’;
h+=’<div class="pills">’+PLATS.map(function(p){return’<button class=“pill’+(S.platforms.includes(p)?” on”:””)+’” data-plat=”’+e(p)+’”>’+e(p)+’</button>’}).join(””)+’</div>’;
h+=’<div class="stitle">’+(l===“TR”?“Minimum puan”:“Min. rating”)+’</div>’;
h+=’<div class="pills">’+RATINGS.map(function(r){return’<button class=“pill’+(S.minR===r.id?” on”:””)+’” data-rat=”’+r.id+’”>’+e(r[l])+’</button>’}).join(””)+’</div>’;
}

if(isLast){
h+=’<button class="fbtn" id="findBtn">’+(l===“TR”?“✦ Bu akşamki önerimi bul”:“✦ Find my pick for tonight”)+’</button>’;
} else {
h+=’<button class=“cbtn’+(canGo?” on”:””)+’” id=“nextBtn”>’+(l===“TR”?“Devam →”:“Continue →”)+’</button>’;
if(skippable)h+=’<div class="skip"><button id="skipBtn">’+(l===“TR”?“Bu adımı geç →”:“Skip this step →”)+’</button></div>’;
}

main.innerHTML=h+’</div>’;

// Attach events
var gb=document.getElementById(“goback”);
if(gb)gb.onclick=function(){goBack();};
var nb=document.getElementById(“nextBtn”);
if(nb)nb.onclick=function(){if(canGo)goNext();};
var fb=document.getElementById(“findBtn”);
if(fb)fb.onclick=function(){findMovie();};
var sb=document.getElementById(“skipBtn”);
if(sb)sb.onclick=function(){skipStep();};

// Dark cards
main.querySelectorAll(”.dc”).forEach(function(card){
card.onclick=function(){
var fld=card.dataset.field;
var val=card.dataset.id;
if(fld===“type”)S.type=val;
else if(fld===“mood”)S.mood=val;
else if(fld===“genre”)S.genre=val;
else if(fld===“who”)S.who=val;
else if(fld===“country”)S.country=val;
else if(fld===“era”)S.era=val;
render();
};
});

// Time pills
main.querySelectorAll(”.pill[data-field=time]”).forEach(function(btn){
btn.onclick=function(){S.time=btn.dataset.id;render();};
});

// Platform pills
main.querySelectorAll(”.pill[data-plat]”).forEach(function(btn){
btn.onclick=function(){
var p=btn.dataset.plat;
var i=S.platforms.indexOf(p);
if(i>=0)S.platforms.splice(i,1);else S.platforms.push(p);
render();
};
});

// Rating pills
main.querySelectorAll(”.pill[data-rat]”).forEach(function(btn){
btn.onclick=function(){S.minR=parseFloat(btn.dataset.rat);render();};
});
}

render();
</script>

</body>
</html>
